{% extends "layout.html"%}

{% block body %}
    <h1 style="color: green;">Orders</h1>
    <table style="border-spacing: 20px;">
        <thead>
            <tr>
                <th>Name</th>
                <th>Food Item</th>
            </tr>
        </thead>
        <tbody>
            {% for name in orders %}
            <tr>
                <td>{{ name }}</td>
                <td>{{ orders[name] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
